<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent; }
    body { display: grid; place-items: end center; }
    button, input { font: inherit; }

    .pet { position: relative; width: 225px; height: 260px; cursor: grab; -webkit-app-region: drag; }
    .pet:active { cursor: grabbing; }
    .mascot { position: absolute; left: 15px; bottom: 35px; width: 195px; height: 195px; object-fit: contain; filter: drop-shadow(0 8px 7px rgba(43,31,22,.22)); pointer-events: none; }

    .bubble { position: absolute; z-index: 5; top: 1px; right: 10px; min-width: 112px; max-width: 205px; padding: 8px 11px; border: 1px solid rgba(91,74,61,.08); border-radius: 12px 12px 3px 12px; color: #342a25; background: rgba(255,253,248,.96); box-shadow: 0 6px 16px rgba(51,37,25,.16); font-family: "Segoe UI","Malgun Gothic",sans-serif; overflow-wrap: anywhere; pointer-events: none; }
    .bubble-nickname { display: block; margin-bottom: 2px; color: #c95f4d; font-size: 11px; font-weight: 800; line-height: 1.3; }
    .bubble-task { display: block; color: #51443c; font-size: 10px; font-weight: 500; line-height: 1.45; }
    .bubble-fallback { color: #51443c; font-size: 10px; line-height: 1.45; }

    .timer-bar { position: absolute; z-index: 8; left: 9px; right: 9px; bottom: 1px; display: grid; grid-template-columns: 1fr 31px 31px; align-items: center; gap: 5px; height: 36px; padding: 4px 5px 4px 12px; border: 1px solid rgba(91,74,61,.1); border-radius: 11px; background: rgba(255,253,248,.97); box-shadow: 0 6px 17px rgba(51,37,25,.17); -webkit-app-region: no-drag; cursor: default; }
    .remaining { color: #45372f; font: 700 14px/1 "Segoe UI",sans-serif; letter-spacing: .04em; font-variant-numeric: tabular-nums; }
    .timer-bar button { display: grid; place-items: center; width: 29px; height: 27px; padding: 0; border: 0; border-radius: 8px; color: #66564b; background: rgba(118,98,84,.09); cursor: pointer; font-size: 15px; }
    .timer-bar button:hover { color: white; background: #d97a63; }

    .complete-panel { position: absolute; z-index: 10; left: 5px; right: 5px; top: 0; display: none; padding: 11px; border: 1px solid rgba(91,74,61,.1); border-radius: 14px; color: #342a25; background: rgba(255,253,248,.98); box-shadow: 0 10px 26px rgba(51,37,25,.22); font: 11px/1.4 "Segoe UI","Malgun Gothic",sans-serif; -webkit-app-region: no-drag; cursor: default; }
    .complete .bubble, .complete .timer-bar { display: none; }
    .complete .complete-panel { display: block; }
    .remote .timer-bar button { display: none; }
    .remote .timer-bar { grid-template-columns: 1fr; }
    .complete-title { margin: 0 0 9px; font-weight: 700; text-align: center; }
    .add-row { display: grid; grid-template-columns: 1fr 31px 68px; align-items: center; gap: 5px; }
    .add-row input { width: 100%; min-width: 0; padding: 6px; border: 1px solid #8d776733; border-radius: 7px; text-align: center; outline: none; }
    .add-row input:focus { border-color: #d7a17c; box-shadow: 0 0 0 2px #d7a17c24; }
    .panel-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 7px; }
    .complete-panel button { padding: 7px 5px; border-radius: 8px; cursor: pointer; }
    #addButton { border: 0; color: white; background: #d97a63; }
    #endButton { border: 1px solid #8d776733; color: #6e5c50; background: white; }
    #errorText { min-height: 14px; margin: 5px 0 0; color: #b84d42; font-size: 9px; text-align: center; }
  </style>
</head>
<body>
  <div id="pet" class="pet resting" title="드래그해서 원하는 곳에 놓으세요">
    <div id="bubble" class="bubble">집중 준비 중이에요.</div>
    <div class="complete-panel" role="dialog" aria-label="타이머 종료 선택">
      <p class="complete-title">타이머가 종료되었습니다.</p>
      <div class="add-row">
        <input id="addMinutes" type="number" min="1" max="180" value="5" aria-label="추가할 시간">
        <span>분</span>
        <button id="addButton" type="button">시간 추가</button>
      </div>
      <div class="panel-actions">
        <button id="quickFive" type="button">+5분</button>
        <button id="endButton" type="button">타이머 종료</button>
      </div>
      <p id="errorText"></p>
    </div>
    <img id="mascot" class="mascot" src="../assets/godori-storybook.png" alt="노트북으로 작업하는 포커스 펫">
    <div class="timer-bar" aria-label="타이머 간편 제어">
      <span id="remaining" class="remaining">25:00</span>
      <button id="toggleButton" type="button" title="일시정지" aria-label="일시정지">Ⅱ</button>
      <button id="resetButton" type="button" title="설정 창 열기" aria-label="설정 창 열기">⚙</button>
    </div>
  </div>
  <script>
    const pet = document.querySelector('#pet');
    const bubble = document.querySelector('#bubble');
    const mascot = document.querySelector('#mascot');
    const remaining = document.querySelector('#remaining');
    const toggleButton = document.querySelector('#toggleButton');
    const resetButton = document.querySelector('#resetButton');
    const addMinutes = document.querySelector('#addMinutes');
    const addButton = document.querySelector('#addButton');
    const quickFive = document.querySelector('#quickFive');
    const endButton = document.querySelector('#endButton');
    const errorText = document.querySelector('#errorText');
    const characterAssets = { hedgehog:'../assets/godori-storybook.png', cat:'../assets/character-cat.png', hamster:'../assets/character-hamster.png', rabbit:'../assets/character-rabbit.png' };
    if (new URLSearchParams(location.search).has('remote')) pet.classList.add('remote');

    function formatTime(seconds) {
      const safe = Math.max(0, Number(seconds) || 0);
      return `${String(Math.floor(safe / 60)).padStart(2,'0')}:${String(safe % 60).padStart(2,'0')}`;
    }
    function requestAdd(value) {
      const minutes = Number(value);
      if (!Number.isInteger(minutes) || minutes < 1 || minutes > 180) {
        errorText.textContent = '1분부터 180분까지 입력해 주세요.';
        return;
      }
      errorText.textContent = '';
      window.petView.addTime(minutes);
    }

    window.petView.onDirection(() => {});
    window.petView.onState(state => {
      const remote = pet.classList.contains('remote');
      pet.className = `pet ${state}${remote ? ' remote' : ''}`;
      toggleButton.textContent = state === 'resting' ? '▶' : 'Ⅱ';
      toggleButton.title = state === 'resting' ? '계속하기' : '일시정지';
      if (state === 'complete') setTimeout(() => addMinutes.focus(), 50);
    });
    window.petView.onSay(content => {
      bubble.replaceChildren();
      if (typeof content === 'object' && content) {
        if (content.nickname) {
          const nickname = document.createElement('span');
          nickname.className = 'bubble-nickname';
          nickname.textContent = content.nickname;
          bubble.append(nickname);
        }
        if (content.task) {
          const task = document.createElement('span');
          task.className = 'bubble-task';
          task.textContent = content.task;
          bubble.append(task);
        }
        if (!content.nickname && !content.task) {
          const fallback = document.createElement('span');
          fallback.className = 'bubble-fallback';
          fallback.textContent = content.fallback || '같이 집중하자!';
          bubble.append(fallback);
        }
        return;
      }
      const fallback = document.createElement('span');
      fallback.className = 'bubble-fallback';
      fallback.textContent = content;
      bubble.append(fallback);
    });
    window.petView.onCharacter(character => { mascot.src = characterAssets[character] || characterAssets.hedgehog; });
    window.petView.onTimer(payload => {
      remaining.textContent = formatTime(payload.remainingSeconds);
      toggleButton.textContent = payload.running ? 'Ⅱ' : '▶';
      toggleButton.title = payload.running ? '일시정지' : '계속하기';
    });

    toggleButton.addEventListener('click', () => window.petView.toggleTimer());
    resetButton.addEventListener('click', () => window.petView.showController());
    addButton.addEventListener('click', () => requestAdd(addMinutes.value));
    quickFive.addEventListener('click', () => requestAdd(5));
    endButton.addEventListener('click', () => window.petView.endTimer());
    addMinutes.addEventListener('keydown', event => { if (event.key === 'Enter') requestAdd(addMinutes.value); });
  </script>
</body>
</html>
